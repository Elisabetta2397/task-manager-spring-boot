<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>

        Dashboard

    </h1>

    <p>

        Ciao!

    </p>

    <p>

        Qui vedrai tutti i tuoi task.

    </p>

    <a
        th:href="@{/tasks/new}"
        class="btn btn-primary">

        Nuovo Task

    </a>

    <hr>

        <h3>I tuoi task</h3>

        <form th:action="@{/dashboard}" method="get" class="mb-3">

    <div class="row">

        <div class="col-md-4">

            <select
                    class="form-select"
                    name="status"
                    onchange="this.form.submit()">

                <option
                        value=""
                        th:selected="${selectedStatus == null}">

                    Tutti i task

                </option>

               <option
                    th:each="status : ${statuses}"
                    th:value="${status}"
                    th:selected="${status == selectedStatus}"
                    th:text="${status.name() == 'TODO' ? 'Da fare' :
                            status.name() == 'IN_PROGRESS' ? 'In corso' :
                            'Completato'}">
                </option>

            </select>

        </div>

        <div class="col-md-4">

    <select
            class="form-select"
            name="priority"
            onchange="this.form.submit()">

        <option
                value=""
                th:selected="${selectedPriority == null}">

            Tutte le priorità

        </option>

        <option
                th:each="priority : ${priorities}"
                th:value="${priority}"
                th:selected="${priority == selectedPriority}"
                th:text="${priority.name() == 'LOW' ? 'Bassa' :
                          priority.name() == 'MEDIUM' ? 'Media' :
                          'Alta'}">
        </option>

    </select>

</div>

    </div>

    

</form>
<form th:action="@{/dashboard}" method="get" class="mb-3">

    <div class="input-group">

        <input
                type="text"
                class="form-control"
                name="title"
                placeholder="Cerca un task..."
                th:value="${searchTitle}">

        <button class="btn btn-primary" type="submit">
            Cerca
        </button>

    </div>

</form>

            <table class="table table-striped">

                <thead>

                <tr>
                    <th>Titolo</th>
                    <th>Priorità</th>
                    <th>Stato</th>
                    <th>Azioni</th>
                </tr>

                </thead>

                <tbody>

                    <tr th:each="task : ${tasks}">

                        <td th:text="${task.title}"></td>

                        <td th:text="${task.priority}"></td>

                        <td>

                                <span
                                        th:if="${task.status.name() == 'TODO'}"
                                        class="badge bg-warning text-dark">

                                    Da fare

                                </span>

                                <span
                                        th:if="${task.status.name() == 'IN_PROGRESS'}"
                                        class="badge bg-primary">

                                    In corso

                                </span>

                                <span
                                        th:if="${task.status.name() == 'COMPLETED'}"
                                        class="badge bg-success">

                                    Completato

                                </span>

                        </td>

                        <td>

                                <a
                                        th:href="@{/tasks/{id}/edit(id=${task.id})}"
                                        class="btn btn-warning btn-sm">

                                    Modifica

                                </a>

                                <form
                                        th:action="@{/tasks/{id}/delete(id=${task.id})}"
                                        method="post"
                                        style="display:inline;">

                                    <button
                                            type="submit"
                                            class="btn btn-danger btn-sm">

                                        Elimina

                                    </button>

                                </form>

                        </td>

                    </tr>

                </tbody>

            </table>

</div>

</body>

</html>
