<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-5">

    <div>

        <h1 class="fw-bold mb-2">
            <i class="bi bi-speedometer2 me-2"></i>
            Dashboard
        </h1>

        <p class="text-muted mb-0">
            Gestisci tutti i tuoi task in un unico posto.
        </p>

    </div>

    <a th:href="@{/tasks/new}"
       class="btn btn-success btn-lg">

        <i class="bi bi-plus-circle me-2"></i>

        Nuovo Task

    </a>

</div>

<div class="row mb-4">

    <div class="col-md-3">

        <div class="card shadow-sm border-0 border-top border-info border-4 text-center">

            <div class="card-body">

                <h6 class="text-muted">
                    <i class="bi bi-list-task text-info">Totale Task</i>
                </h6>

                <h2 th:text="${totalTasks}"></h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow-sm border-0 border-top border-warning border-4 text-center">
            <div class="card-body">

                <h6 class="text-muted">
                    <i class="bi bi-hourglass-split text-warning">Da fare</i>
                </h6>

                <h2 th:text="${todoTasks}"></h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow-sm border-0 border-top border-primary border-4 text-center">

            <div class="card-body">

                <h6 class="text-muted">
                    <i class="bi bi-arrow-repeat text-primary">In corso</i>
                </h6>

                <h2 th:text="${inProgressTasks}"></h2>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow-sm border-0 border-top border-success border-4 text-center">
            <div class="card-body">

                <h6 class="text-muted">
                    <i class="bi bi-check-circle text-success">Completati</i>
                </h6>

                <h2 th:text="${completedTasks}"></h2>

            </div>

        </div>

    </div>

</div>

    <hr>

        <h3>I tuoi task</h3>

        <form th:action="@{/dashboard}" method="get" class="mb-3">

    <div class="row">

        <div class="col-md-4">

            <select
                    class="form-select"
                    name="status"
                    onchange="this.form.submit()">

                <option
                        value=""
                        th:selected="${selectedStatus == null}">

                    Tutti i task

                </option>

               <option
                    th:each="status : ${statuses}"
                    th:value="${status}"
                    th:selected="${status == selectedStatus}"
                    th:text="${status.name() == 'TODO' ? 'Da fare' :
                            status.name() == 'IN_PROGRESS' ? 'In corso' :
                            'Completato'}">
                </option>

            </select>

        </div>

        <div class="col-md-4">

    <select
            class="form-select"
            name="priority"
            onchange="this.form.submit()">

        <option
                value=""
                th:selected="${selectedPriority == null}">

            Tutte le priorità

        </option>

        <option
                th:each="priority : ${priorities}"
                th:value="${priority}"
                th:selected="${priority == selectedPriority}"
                th:text="${priority.name() == 'LOW' ? 'Bassa' :
                          priority.name() == 'MEDIUM' ? 'Media' :
                          'Alta'}">
        </option>

    </select>

</div>

    </div>

    

</form>
<form th:action="@{/dashboard}" method="get" class="mb-3">

    <div class="input-group">

        <input
                type="text"
                class="form-control"
                name="title"
                placeholder="Cerca un task..."
                th:value="${searchTitle}">

        <button class="btn btn-primary" type="submit">
            Cerca
        </button>

    </div>

</form>

<div
        th:if="${#lists.isEmpty(tasks)}"
        class="alert alert-info text-center shadow-sm">

    <i class="bi bi-info-circle me-2"></i>

    Non hai ancora creato nessun task.

    <br><br>

    <a
            th:href="@{/tasks/new}"
            class="btn btn-primary">

        <i class="bi bi-plus-circle me-1"></i>

        Crea il primo task

    </a>

</div>

            <table
        th:unless="${#lists.isEmpty(tasks)}"
        class="table table-hover align-middle shadow-sm">

                <thead>

                <tr>
                    <th>Titolo</th>
                    <th>Priorità</th>
                    <th>Stato</th>
                    <th>Azioni</th>
                </tr>

                </thead>

                <tbody>

                    <tr th:each="task : ${tasks}">

                        <td th:text="${task.title}"></td>

                        <td
                            th:text="${task.priority.name() == 'HIGH' ? 'Alta' :
                                    task.priority.name() == 'MEDIUM' ? 'Media' :
                                    'Bassa'}">
                        </td>
                        <td>

                                <span
                                        th:if="${task.status.name() == 'TODO'}"
                                        class="badge bg-warning text-dark">

                                    Da fare

                                </span>

                                <span
                                        th:if="${task.status.name() == 'IN_PROGRESS'}"
                                        class="badge bg-primary">

                                    In corso

                                </span>

                                <span
                                        th:if="${task.status.name() == 'COMPLETED'}"
                                        class="badge bg-success">

                                    Completato

                                </span>

                        </td>

                        <td>

                                <a
                                        th:href="@{/tasks/{id}/edit(id=${task.id})}"
                                        class="btn btn-warning btn-sm">

                                   <i class="bi bi-pencil-square me-1"></i>
                                            Modifica

                                </a>

                                <form
                                        th:action="@{/tasks/{id}/delete(id=${task.id})}"
                                        method="post"
                                        style="display:inline;">

                                    <button
                                            type="submit"
                                            class="btn btn-danger btn-sm">

                                        <i class="bi bi-trash me-1"></i>
                                                Elimina

                                    </button>

                                </form>

                        </td>

                    </tr>

                </tbody>

            </table>

</div>

</body>

</html>
