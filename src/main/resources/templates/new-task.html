<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Nuovo Task</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Nuovo Task</h2>

    <form
        th:action="@{/tasks}"
        th:object="${createTaskDto}"
        method="post">

        <div class="mb-3">

            <label class="form-label">

                Titolo

            </label>

            <input
                    type="text"
                    th:field="*{title}"
                    class="form-control">

        </div>

        <div class="mb-3">

            <label class="form-label">

                Descrizione

            </label>

            <textarea
                    th:field="*{description}"
                    class="form-control">

            </textarea>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Priorità

            </label>

            <select
                    th:field="*{priority}"
                    class="form-select">

                <option
                        th:value="${T(com.elisabetta.taskmanager.model.Priority).LOW}">

                    Bassa

                </option>

                <option
                        th:value="${T(com.elisabetta.taskmanager.model.Priority).MEDIUM}">

                    Media

                </option>

                <option
                        th:value="${T(com.elisabetta.taskmanager.model.Priority).HIGH}">

                    Alta

                </option>

            </select>

        </div>

        <button
                type="submit"
                 class="btn btn-success">

            Salva

        </button>

    </form>

</div>

</body>

</html>
