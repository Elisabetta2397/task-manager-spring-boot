<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card">

                <div class="card-header text-center">

                    <h3>Login</h3>
                    <div
                        th:if="${param.error}"
                        class="alert alert-danger">

                        Email o password non validi.

                    </div>

                    <div
                        th:if="${param.logout}"
                        class="alert alert-success">

                        Logout effettuato con successo.

                    </div>
                </div>

                <div class="card-body">

                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">

                            <label class="form-label">

                                Email

                            </label>

                            <input
                                type="email"
                                name="username"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>
                        </div>

                        <button
                                type="submit"
                                class="btn btn-primary w-100">

                                Accedi

                            </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
