<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card">

                <div class="card-header text-center">

                    <h3>Login</h3>

                </div>

                <div class="card-body">

                    <form>

                        <div class="mb-3">

                            <label class="form-label">

                                Email

                            </label>

                            <input
                                    type="email"
                                    class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input
                                    type="password"
                                    class="form-control">

                        </div>

                        <button
                                class="btn btn-primary w-100">

                            Accedi

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
